<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Traffic AI</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

</head>

<body>

<div style="
text-align:center;
margin-bottom:15px;
">

<h2 style="
margin-bottom:3px;
">
🚦 Traffic AI Dashboard
</h2>

<p style="
font-size:13px;
color:#666;
margin:0;
">
Designed by Mehedi Hasan
</p>

</div>

<div class="controls">

<button id="startBtn">
📷 Start Camera
</button>

<button id="stopBtn">
⛔ Stop Camera
</button>

<button id="saveBtn">
💾 Save Snapshot
</button>

<button id="csvBtn">
📄 Export CSV
</button>

<button id="historyBtn">
📚 View History
</button>

<button id="galleryBtn">
🖼 Gallery
</button>

</div>

<div id="cameraContainer">

<video
id="video"
autoplay
playsinline
muted>
</video>

<canvas id="canvas"></canvas>

</div>

<div id="stats">

<h3>Live Statistics</h3>

<div id="counts">
Waiting...
</div>

</div>

<div id="customTraining">

<h3>Custom Dataset</h3>

<input
type="text"
id="className"
placeholder="Nosimon">

<input
type="file"
id="datasetImages"
multiple
accept="image/*">

<button id="addDatasetBtn">
Add Dataset
</button>

<div id="datasetInfo">
No Dataset Added
</div>

</div>

<div id="galleryContainer" style="display:none;">

<h3>Snapshot Gallery</h3>

<div id="galleryList"></div>

</div>

<div id="historyContainer" style="display:none;">

<h3>Traffic History</h3>

<div id="historyList"></div>

</div>

<div id="historyPreview"
style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
z-index:999;
">

<img
id="historyPreviewImg"
style="
max-width:95%;
max-height:90%;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
">

</div>
  
<script src="db.js"></script>
<script src="app.js"></script>
<footer
style="
margin-top:30px;
padding:15px;
text-align:center;
font-size:14px;
color:#666;
width:100%;
">

Developed by
<b>Mehedi Hasan</b>

</footer>
</body>

</html>
