<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Traffic AI</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
</head>

<body>

<h2>Traffic AI Dashboard</h2>

<div class="controls">

<button id="startBtn">
📷 Start Camera
</button>

<button id="stopBtn">
⛔ Stop Camera
</button>

<button id="saveBtn">
💾 Save Snapshot
</button>

<button id="csvBtn">
📄 Export CSV
</button>

</div>

<div id="cameraContainer">

<video
id="video"
autoplay
playsinline
muted>
</video>

<canvas id="canvas"></canvas>

</div>

<div id="stats">

<h3>Live Statistics</h3>

<div id="counts">
Waiting...
</div>

</div>

<div id="customTraining">

<h3>Custom Dataset</h3>

<input
type="text"
id="className"
placeholder="Nosimon">

<input
type="file"
id="datasetImages"
multiple
accept="image/*">

<button id="addDatasetBtn">
Add Dataset
</button>

<div id="datasetInfo">
No Dataset Added
</div>

</div>

<script src="db.js"></script>
<script src="app.js"></script>

</body>
</html>
